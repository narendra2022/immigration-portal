name: Daily Immigration Scraper

on:
  schedule:
    # Run every day at 11:00 AM UTC (6:00 AM EST)
    - cron: '0 11 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab

permissions:
  contents: write # Allows writing to repository storage

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout Repository
    - name: Checkout Code
      uses: actions/checkout@v3
      with:
        fetch-depth: 0

    # 2. Setup Python environment
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip'

    # 3. Install dependencies
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt

    # 4. Execute Scraper and Summarizer
    - name: Run Scraper
      env:
        # Securely pass Gemini API Key if defined in Repository Secrets
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        python backend/refresh.py

    # 5. Commit and Push changes
    - name: Commit Updated News Data
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add frontend/news_data.json
        # Only commit if file actually changed
        if git diff --staged --quiet; then
          echo "No changes in news data. Skipping commit."
        else
          git commit -m "Auto-update immigration news feeds [skip ci]"
          git push
          echo "Changes committed and pushed successfully!"
        fi
